<!DOCTYPE html>
<html>
<head>
    <title>Bài thi - {{ course.name }}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Bài thi: {{ course.name }}</h2>
    <form action="{% url 'submit' course.id %}" method="post">
        {% csrf_token %}
        
        {% for lesson in course.lesson_set.all %}
            {% for question in lesson.question_set.all %}
                <div class="card mt-3 shadow-sm">
                    <div class="card-header bg-light"><strong>Câu hỏi:</strong> {{ question.question_text }}</div>
                    <div class="card-body">
                        {% for choice in question.choice_set.all %}
                            <div class="form-check my-2">
                                <input class="form-check-input" type="radio" name="question_{{ question.id }}" id="choice_{{ choice.id }}" value="{{ choice.id }}">
                                <label class="form-check-label" for="choice_{{ choice.id }}">{{ choice.choice_text }}</label>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            {% endfor %}
        {% endfor %}
        
        <button type="submit" class="btn btn-success mt-4 px-5">Nộp bài</button>
    </form>
</body>
</html>
