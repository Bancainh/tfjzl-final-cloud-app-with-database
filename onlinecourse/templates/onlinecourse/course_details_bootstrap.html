<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết khóa học - {{ course.name }}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h2>Khóa học: {{ course.name }}</h2>
            </div>
            <div class="card-body">
                <p class="card-text">{{ course.description }}</p>
                
                <h4 class="mt-4 text-secondary">Danh sách bài học:</h4>
                <ul class="list-group mt-3">
                    {% for lesson in course.lesson_set.all %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            {{ lesson.title }}
                            <span class="badge badge-primary badge-pill">Lesson</span>
                        </li>
                    {% empty %}
                        <li class="list-group-item text-danger">Khóa học này hiện chưa có bài học nào.</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
